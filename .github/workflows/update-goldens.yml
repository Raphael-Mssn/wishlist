name: Update Goldens

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update goldens on'
        required: true
        default: 'main'

jobs:
  update-goldens:
    name: Regenerate Golden Files
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wishlist
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          version: 3.41.4
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Update golden files
        run: flutter test --update-goldens

      - name: Check for changes
        id: changes
        run: |
          cd ..
          if git diff --quiet -- 'wishlist/test/**/preview/'; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated goldens
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'wishlist/test/**/preview/*.png'
          git commit -m "test: update golden files from CI (Linux)"
          git push

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'test/**'

# Évite les runs en doublon et annule les anciens runs si un nouveau commit est pushé
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true
 
jobs:
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wishlist
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          version: 3.41.4
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed lib test

      - name: Analyze code
        run: flutter analyze

  test:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wishlist
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          version: 3.41.4
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests & update goldens
        run: flutter test --update-goldens

      - name: Check for golden changes
        id: goldens
        run: |
          cd ..
          if git diff --quiet -- 'wishlist/test/**/preview/'; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated goldens
        if: steps.goldens.outputs.changed == 'true'
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'wishlist/test/**/preview/*.png'
          git commit -m "test: update golden files [skip ci]"
          git push

      - name: Re-run tests to validate updated goldens
        if: steps.goldens.outputs.changed == 'true'
        run: flutter test
